name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Run tests
        run: node --test test/*.test.js
